<style>
html, body { width: auto; height: auto; min-height: 100vh; overflow: auto; }
body { padding: 56px 64px; }
h1 { font-family: 'Fraunces', Georgia, serif; font-weight: 400; font-size: 56px; letter-spacing: -0.022em; margin-bottom: 8px; }
.sub { font-family: 'Instrument Sans', sans-serif; font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted-warm); margin-bottom: 40px; }
h2 { font-family: 'Instrument Sans', sans-serif; font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted-warm); font-weight: 500; margin: 32px 0 16px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
a.card {
  display: block;
  text-decoration: none;
  color: var(--ink);
  background: #fff;
  border: 1px solid var(--line);
  padding: 0;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
}
a.card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(42,26,18,0.08); }
a.card .thumb { aspect-ratio: 16/9; background: var(--cream-warm) center/cover no-repeat; }
a.card .meta { padding: 14px 16px; display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
a.card .name { font-family: 'Fraunces', Georgia, serif; font-size: 20px; }
a.card .id { font-family: 'Instrument Sans', sans-serif; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted-warm); }
.onepager .thumb { aspect-ratio: 8.5/11; background-size: cover; }
</style>
</head>
