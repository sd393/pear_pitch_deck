<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
html, body { background: var(--coral); }
.slide {
  background: var(--coral);
  color: #fff;
  justify-content: center;
  align-items: center;
  text-align: center;
}
.slide .logo-mark {
  position: static;
  width: 156px;
  height: 156px;
  margin: 0 auto 64px;
  filter: brightness(0) invert(1);
}
.slide .eyebrow {
  color: rgba(255,255,255,0.85);
  margin-bottom: 56px;
}
.slide .headline {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-style: italic;
  font-size: 132px;
  letter-spacing: -0.025em;
  line-height: 1.02;
  margin-bottom: 48px;
  color: #fff;
  max-width: 18ch;
  font-optical-sizing: none;
  font-variation-settings: "opsz" 14;
}
.slide .sub {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-size: 48px;
  line-height: 1.3;
  color: #fff;
  margin-bottom: 80px;
  max-width: 42ch;
}
.slide .url {
  display: inline-block;
  background: #fff;
  color: var(--coral);
  font-weight: 500;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 36px;
  padding: 26px 56px;
  letter-spacing: -0.005em;
}
.slide .footer { color: rgba(255,255,255,0.6); left: 128px; right: 128px; }
</style>
</head>
<body>
<div class="slide">
  <div class="logo-mark"><img src="giftly_logo.png" alt=""></div>
  <p class="eyebrow">the answer</p>
  <h1 class="headline">giftly is the ground truth for product quality.</h1>
  <p class="sub">the API every agent queries before they buy.</p>
  <div class="url">trygiftly.com</div>
  <div class="footer">
    <span>giftly</span>
    <span>03 · 07</span>
  </div>
</div>
</body>
</html>
