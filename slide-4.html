<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
html, body { background: var(--cream); }
.slide { background: var(--cream); justify-content: flex-start; padding-top: 200px; }
.slide .eyebrow { margin-bottom: 40px; }
.slide .headline {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-size: 96px;
  letter-spacing: -0.022em;
  line-height: 1.02;
  max-width: 22ch;
  margin-bottom: 72px;
}
.flow {
  display: grid;
  grid-template-columns: 1fr auto 1fr auto 1fr;
  align-items: center;
  gap: 32px;
  max-width: 1500px;
  margin-bottom: 60px;
}
.node {
  border: 2px solid var(--ink);
  background: #fff;
  padding: 28px 32px;
  text-align: center;
}
.node .label {
  font-family: 'Instrument Sans', sans-serif;
  font-size: 16px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted-warm);
  margin-bottom: 8px;
  font-weight: 500;
}
.node .name {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 30px;
  font-weight: 400;
  line-height: 1.2;
  color: var(--ink);
}
.arrow {
  font-family: 'Instrument Sans', sans-serif;
  font-size: 48px;
  color: var(--coral);
  font-weight: 400;
  line-height: 1;
}
.tag {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-weight: 300;
  color: var(--coral);
  font-size: 40px;
  line-height: 1.3;
  letter-spacing: -0.01em;
  max-width: 44ch;
}
</style>
</head>
<body>
<div class="slide">
  <div class="logo-mark"><img src="../../public/apple-icon.png" alt=""></div>
  <p class="eyebrow">the trust layer</p>
  <h1 class="headline">the largest network of <span class="accent">human evaluators</span> on earth.</h1>
  <div class="flow">
    <div class="node"><div class="label">network</div><div class="name">creators · experts · verified buyers</div></div>
    <div class="arrow">→</div>
    <div class="node"><div class="label">output</div><div class="name">honest, structured product data</div></div>
    <div class="arrow">→</div>
    <div class="node"><div class="label">consumer</div><div class="name">your shopping agent</div></div>
  </div>
  <p class="tag">every agent shopping with our data pays us.</p>
  <div class="footer">
    <span>giftly</span>
    <span>04 · 07</span>
  </div>
</div>
</body>
</html>
