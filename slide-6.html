<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
html, body { background: var(--cream); }
.slide { background: var(--cream); justify-content: flex-start; padding-top: 200px; }
.slide .headline {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-size: 96px;
  letter-spacing: -0.022em;
  line-height: 1.05;
  max-width: 22ch;
  margin-bottom: 88px;
}
.metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px 96px;
  max-width: 1500px;
}
.metric { display: flex; flex-direction: column; gap: 12px; }
.metric .num {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 300;
  font-style: italic;
  font-size: 96px;
  color: var(--coral);
  line-height: 1;
  letter-spacing: -0.025em;
}
.metric .label {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 32px;
  color: var(--ink);
  font-weight: 400;
  line-height: 1.25;
  letter-spacing: -0.005em;
}
</style>
</head>
<body>
<div class="slide">
  <div class="logo-mark"><img src="../../public/apple-icon.png" alt=""></div>
  <h1 class="headline">in <span class="accent">1 week</span>, our network secured:</h1>
  <div class="metrics">
    <div class="metric">
      <div class="num">50</div>
      <div class="label">vetted creators</div>
    </div>
    <div class="metric">
      <div class="num">~2M</div>
      <div class="label">combined reach</div>
    </div>
    <div class="metric">
      <div class="num">7</div>
      <div class="label">official brand partnerships</div>
    </div>
    <div class="metric">
      <div class="num">$300M</div>
      <div class="label">combined partner valuation</div>
    </div>
  </div>
  <div class="footer">
    <span>giftly</span>
    <span>06 · 07</span>
  </div>
</div>
</body>
</html>
