<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
html, body { background: var(--cream); }
.slide { background: var(--cream); }
.slide .wordmark {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-size: 132px;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--coral);
  margin-bottom: 64px;
}
.slide .headline {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-size: 116px;
  letter-spacing: -0.022em;
  line-height: 1.02;
  max-width: 22ch;
}
</style>
</head>
<body>
<div class="slide">
  <div class="logo-mark"><img src="giftly_logo.png" alt=""></div>
  <p class="wordmark">giftly</p>
  <h1 class="headline">
    we help <span class="accent">agents</span> find products you <span class="accent">love</span>.
  </h1>
  <div class="footer">
    <span>giftly</span>
    <span>01 · 09</span>
  </div>
</div>
</body>
</html>
