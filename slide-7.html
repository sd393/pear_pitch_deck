<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
html, body { background: var(--coral); }
.slide {
  background: var(--coral);
  color: #fff;
  justify-content: center;
  align-items: center;
  text-align: center;
}
.slide .logo-mark {
  position: static;
  width: 156px;
  height: 156px;
  margin: 0 auto 56px;
  filter: brightness(0) invert(1);
}
.slide .eyebrow {
  color: rgba(255,255,255,0.85);
  margin-bottom: 48px;
}
.slide .headline {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 300;
  font-style: italic;
  font-size: 116px;
  letter-spacing: -0.022em;
  line-height: 1.05;
  margin-bottom: 64px;
  color: #fff;
  max-width: 24ch;
}
.slide .sub {
  font-family: 'Instrument Sans', sans-serif;
  font-size: 24px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
  color: rgba(255,255,255,0.85);
}
.slide .url {
  display: inline-block;
  background: #fff;
  color: var(--coral);
  font-weight: 500;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 32px;
  padding: 22px 48px;
  margin-top: 32px;
  letter-spacing: -0.005em;
}
.slide .footer { color: rgba(255,255,255,0.6); left: 128px; right: 128px; }
</style>
</head>
<body>
<div class="slide">
  <div class="logo-mark"><img src="../../public/apple-icon.png" alt=""></div>
  <p class="eyebrow">the bet</p>
  <h1 class="headline">the future of agentic commerce will run on Giftly.</h1>
  <p class="sub">the trust layer for agent commerce</p>
  <div class="url">trygiftly.com</div>
  <div class="footer">
    <span>giftly</span>
    <span>07 · 07</span>
  </div>
</div>
</body>
</html>
